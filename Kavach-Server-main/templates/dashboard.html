<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavach Admin Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-page: #f0f2f5;
            --bg-white: #ffffff;
            --bg-hover: #f8f9fb;
            --accent: #4f46e5;
            --accent-light: #eef2ff;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --danger-border: #fecaca;
            --success: #16a34a;
            --success-light: #f0fdf4;
            --success-border: #bbf7d0;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --medical: #7c3aed;
            --medical-light: #f5f3ff;
            --medical-border: #ddd6fe;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --radius: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 12px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo-mark {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-mark svg { width: 18px; height: 18px; fill: #fff; }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .header-badge {
            background: var(--accent-light);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .refresh-info {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--text-muted);
        }
        .pulse-dot {
            width: 7px; height: 7px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .logout-btn {
            padding: 6px 14px;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
        }
        .logout-btn:hover {
            background: var(--danger-light);
            color: var(--danger);
            border-color: var(--danger-border);
        }

        /* ── Container ──────────────────────────────────── */
        .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

        /* ── Stats Bar ──────────────────────────────────── */
        .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
        @media (max-width: 900px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 22px;
            box-shadow: var(--shadow-sm);
        }
        .stat-card .label {
            font-size: 12px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 6px; font-weight: 500;
        }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .value.total { color: var(--accent); }
        .stat-card .value.sos { color: var(--danger); }
        .stat-card .value.medical { color: var(--medical); }
        .stat-card .value.devices { color: var(--success); }
        .stat-card .value.files { color: var(--warning); }

        /* ── Grid ───────────────────────────────────────── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }

        /* ── Panel / Card ───────────────────────────────── */
        .panel {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .panel-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-primary);
        }
        .panel-header .sub { font-size: 12px; color: var(--text-muted); font-weight: 400; }

        /* ── Map ────────────────────────────────────────── */
        #map { height: 420px; width: 100%; background: var(--bg-page); }

        /* ── Table ──────────────────────────────────────── */
        .table-scroll { max-height: 420px; overflow-y: auto; }
        .table-scroll::-webkit-scrollbar { width: 5px; }
        .table-scroll::-webkit-scrollbar-track { background: transparent; }
        .table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            position: sticky; top: 0;
            background: var(--bg-page);
            padding: 10px 14px;
            text-align: left;
            font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.4px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            white-space: nowrap;
        }
        tbody tr:hover { background: var(--bg-hover); }

        /* ── Badges ─────────────────────────────────────── */
        .badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 6px; font-size: 11px; font-weight: 600;
        }
        .badge-sos {
            background: var(--danger-light); color: var(--danger);
            border: 1px solid var(--danger-border);
        }
        .badge-medical {
            background: var(--medical-light); color: var(--medical);
            border: 1px solid var(--medical-border);
        }
        .badge-safe {
            background: var(--success-light); color: var(--success);
            border: 1px solid var(--success-border);
        }

        /* ── Status dots ────────────────────────────────── */
        .status-dot {
            display: inline-block; width: 7px; height: 7px;
            border-radius: 50%; margin-right: 5px;
        }
        .status-dot.on { background: var(--success); }
        .status-dot.off { background: var(--border); }

        /* ── Links ──────────────────────────────────────── */
        .link { color: var(--accent); text-decoration: none; font-size: 12px; }
        .link:hover { text-decoration: underline; }

        /* ── Evidence Section ───────────────────────────── */
        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
            padding: 20px;
        }
        .evidence-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: box-shadow 0.15s;
        }
        .evidence-card:hover { box-shadow: var(--shadow-md); }

        .evidence-preview {
            height: 120px;
            background: var(--bg-page);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .evidence-preview img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .evidence-preview .file-icon {
            font-size: 32px; color: var(--text-muted);
        }
        .evidence-preview .file-type-tag {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.6); color: #fff;
            padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 600; text-transform: uppercase;
        }
        .evidence-info {
            padding: 10px 12px;
        }
        .evidence-info .name {
            font-size: 12px; font-weight: 600; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .evidence-info .meta {
            font-size: 11px; color: var(--text-muted); margin-top: 3px;
        }
        .evidence-info .alert-ref {
            font-size: 11px; margin-top: 4px;
        }
        .evidence-download {
            display: block; text-align: center;
            padding: 8px; border-top: 1px solid var(--border-light);
            color: var(--accent); font-size: 12px; font-weight: 600;
            text-decoration: none; transition: background 0.15s;
        }
        .evidence-download:hover { background: var(--accent-light); }

        .evidence-filter {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 5px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--bg-white);
            font-size: 12px; color: var(--text-secondary);
            cursor: pointer; transition: all 0.15s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }

        /* ── Empty state ────────────────────────────────── */
        .empty-state {
            text-align: center; padding: 50px 20px; color: var(--text-muted);
        }
        .empty-state .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }

        /* ── Tabs ───────────────────────────────────────── */
        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
        .tab {
            padding: 12px 24px; font-size: 13px; font-weight: 600;
            color: var(--text-muted); cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .tab:hover { color: var(--text-secondary); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo-mark">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.83-3.13 9.37-7 10.5-3.87-1.13-7-5.67-7-10.5V6.3l7-3.12z"/></svg>
            </div>
            <h1>KAVACH</h1>
            <span class="header-badge">Admin</span>
        </div>
        <div class="header-right">
            <div class="refresh-info">
                <span class="pulse-dot"></span>
                <span>Live</span>
                <span id="lastUpdate" style="margin-left: 4px;"></span>
            </div>
            <a href="/logout" class="logout-btn">Sign Out</a>
        </div>
    </div>

    <div class="container">

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="label">Total Alerts</div>
                <div class="value total" id="statTotal">-</div>
            </div>
            <div class="stat-card">
                <div class="label">SOS Alerts</div>
                <div class="value sos" id="statSOS">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Medical</div>
                <div class="value medical" id="statMedical">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Devices</div>
                <div class="value devices" id="statDevices">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Evidence Files</div>
                <div class="value files" id="statFiles">-</div>
            </div>
        </div>

        <!-- Map + Recent Alerts -->
        <div class="grid-2">
            <div class="panel">
                <div class="panel-header">
                    <span>Alert Locations</span>
                    <span class="sub" id="mapCount"></span>
                </div>
                <div id="map"></div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <span>Recent Alerts</span>
                    <span class="sub" id="recentCount"></span>
                </div>
                <div class="table-scroll" id="recentTable">
                    <div class="empty-state">
                        <div class="icon">&#9203;</div>
                        <div>Loading alerts...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabbed Section: All Alerts / Evidence -->
        <div class="panel">
            <div class="tabs">
                <div class="tab active" data-tab="alerts-tab">All Alerts</div>
                <div class="tab" data-tab="evidence-tab">Evidence Files</div>
            </div>

            <!-- All Alerts Tab -->
            <div class="tab-content active" id="alerts-tab">
                <div class="table-scroll" id="allTable" style="max-height: 500px;">
                    <div class="empty-state">
                        <div class="icon">&#128202;</div>
                        <div>Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Evidence Tab -->
            <div class="tab-content" id="evidence-tab">
                <div style="padding: 16px 20px 0; display: flex; justify-content: space-between; align-items: center;">
                    <div class="evidence-filter" id="evidenceFilter">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="image">Images</button>
                        <button class="filter-btn" data-filter="video">Videos</button>
                        <button class="filter-btn" data-filter="audio">Audio</button>
                    </div>
                    <span class="sub" id="evidenceCount" style="font-size:12px; color: var(--text-muted);"></span>
                </div>
                <div class="evidence-grid" id="evidenceGrid">
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="icon">&#128193;</div>
                        <div>No evidence files yet</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

<script>
    // ── Tabs ──────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab).classList.add('active');
        });
    });

    // ── Evidence Filter ──────────────────────────────────
    document.getElementById('evidenceFilter').addEventListener('click', e => {
        if (!e.target.classList.contains('filter-btn')) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        const filter = e.target.dataset.filter;
        document.querySelectorAll('.evidence-card').forEach(card => {
            if (filter === 'all') { card.style.display = ''; return; }
            card.style.display = card.dataset.type === filter ? '' : 'none';
        });
    });

    // ── Map ──────────────────────────────────────────────
    const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([20.5937, 78.9629], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
    const markers = L.layerGroup().addTo(map);

    function makeIcon(color) {
        return L.divIcon({
            html: `<div style="width:12px;height:12px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 1px 4px ${color}60;"></div>`,
            iconSize: [12, 12], iconAnchor: [6, 6], className: ''
        });
    }
    const sosIcon = makeIcon('#dc2626');
    const medicalIcon = makeIcon('#7c3aed');
    const defaultIcon = makeIcon('#4f46e5');

    // ── Helpers ──────────────────────────────────────────
    function formatTime(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        return d.toLocaleString('en-IN', {
            day: '2-digit', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
        });
    }

    function esc(s) {
        if (s == null) return '';
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }

    function typeBadge(type) {
        if (!type) return '<span class="badge">-</span>';
        const t = type.toUpperCase();
        if (t === 'SOS') return '<span class="badge badge-sos">SOS</span>';
        if (t === 'MEDICAL') return '<span class="badge badge-medical">MEDICAL</span>';
        return `<span class="badge badge-safe">${t}</span>`;
    }

    function statusDot(val) {
        return `<span class="status-dot ${val ? 'on' : 'off'}"></span>${val ? 'Yes' : 'No'}`;
    }

    function gpsLink(loc) {
        if (!loc) return '<span style="color:var(--text-muted)">-</span>';
        try {
            const [lat, lon] = loc.split(',').map(Number);
            if (isNaN(lat) || isNaN(lon)) return loc;
            return `<a href="https://maps.google.com/?q=${lat},${lon}" target="_blank" class="link">${lat.toFixed(4)}, ${lon.toFixed(4)}</a>`;
        } catch { return loc; }
    }

    function parseGPS(loc) {
        if (!loc) return null;
        try {
            const [lat, lon] = loc.split(',').map(Number);
            return (isNaN(lat) || isNaN(lon)) ? null : [lat, lon];
        } catch { return null; }
    }

    function getFileType(name) {
        const ext = name.split('.').pop().toLowerCase();
        if (['jpg','jpeg','png','gif','bmp','webp'].includes(ext)) return 'image';
        if (['mp4','h264','avi','mkv','mov','webm'].includes(ext)) return 'video';
        if (['wav','mp3','ogg','aac','flac'].includes(ext)) return 'audio';
        return 'other';
    }

    function getFileIcon(type) {
        if (type === 'image') return '&#128247;';
        if (type === 'video') return '&#127909;';
        if (type === 'audio') return '&#127911;';
        return '&#128196;';
    }

    function evidenceLinks(files) {
        if (!files) return '-';
        return files.split(',').filter(f => f.trim()).map(f => {
            const name = f.trim();
            const short = name.length > 22 ? name.substring(0, 22) + '...' : name;
            return `<a href="/uploads/${name}" target="_blank" class="link">${short}</a>`;
        }).join('<br>');
    }

    // ── Build Tables ─────────────────────────────────────
    function buildRecentTable(alerts) {
        if (!alerts.length) return `<div class="empty-state"><div class="icon">&#128276;</div><div>No alerts yet</div></div>`;
        const recent = alerts.slice(0, 10);
        let html = `<table><thead><tr><th>Time</th><th>Type</th><th>Trigger</th><th>Location</th><th>Battery</th></tr></thead><tbody>`;
        for (const a of recent) {
            html += `<tr>
                <td>${formatTime(a.timestamp)}</td>
                <td>${typeBadge(a.alert_type)}</td>
                <td>${esc(a.trigger_source) || '-'}</td>
                <td>${gpsLink(a.gps_location)}</td>
                <td>${a.battery_percentage != null ? esc(a.battery_percentage) + '%' : '-'}</td>
            </tr>`;
        }
        return html + '</tbody></table>';
    }

    function buildFullTable(alerts) {
        if (!alerts.length) return `<div class="empty-state"><div class="icon">&#128202;</div><div>No alerts in database</div></div>`;
        let html = `<table><thead><tr>
            <th>ID</th><th>Time</th><th>Device</th><th>Type</th><th>Trigger</th>
            <th>Location</th><th>Battery</th><th>Call</th><th>SMS</th><th>Evidence</th>
        </tr></thead><tbody>`;
        for (const a of alerts) {
            html += `<tr>
                <td>#${esc(a.id)}</td>
                <td>${formatTime(a.timestamp)}</td>
                <td>${esc(a.device_id)}</td>
                <td>${typeBadge(a.alert_type)}</td>
                <td>${esc(a.trigger_source) || '-'}</td>
                <td>${gpsLink(a.gps_location)}</td>
                <td>${a.battery_percentage != null ? a.battery_percentage + '%' : '-'}</td>
                <td>${statusDot(a.call_placed_status)}</td>
                <td>${statusDot(a.guardian_sms_status)}</td>
                <td>${evidenceLinks(a.uploaded_files)}</td>
            </tr>`;
        }
        return html + '</tbody></table>';
    }

    // ── Build Evidence Grid ──────────────────────────────
    function buildEvidenceGrid(alerts) {
        const allFiles = [];
        for (const a of alerts) {
            if (!a.uploaded_files) continue;
            for (const fname of a.uploaded_files.split(',')) {
                const name = fname.trim();
                if (!name) continue;
                allFiles.push({ name, alert: a });
            }
        }

        if (!allFiles.length) {
            return `<div class="empty-state" style="grid-column:1/-1"><div class="icon">&#128193;</div><div>No evidence files uploaded yet</div></div>`;
        }

        document.getElementById('evidenceCount').textContent = allFiles.length + ' files';

        let html = '';
        for (const f of allFiles) {
            const type = getFileType(f.name);
            const ext = f.name.split('.').pop().toUpperCase();
            const isImage = type === 'image';

            html += `<div class="evidence-card" data-type="${type}">
                <div class="evidence-preview">
                    ${isImage
                        ? `<img src="/uploads/${f.name}" alt="${f.name}" loading="lazy">`
                        : `<span class="file-icon">${getFileIcon(type)}</span>`
                    }
                    <span class="file-type-tag">${ext}</span>
                </div>
                <div class="evidence-info">
                    <div class="name" title="${esc(f.name)}">${esc(f.name)}</div>
                    <div class="meta">Alert #${esc(f.alert.id)} &middot; ${esc(f.alert.alert_type) || 'N/A'}</div>
                    <div class="alert-ref">${typeBadge(f.alert.alert_type)} ${formatTime(f.alert.timestamp)}</div>
                </div>
                <a href="/uploads/${f.name}" target="_blank" class="evidence-download">View / Download</a>
            </div>`;
        }
        return html;
    }

    // ── Fetch & Render ───────────────────────────────────
    async function loadAlerts() {
        try {
            const res = await fetch('/api/alerts?limit=200');
            if (res.status === 302 || res.redirected) { window.location.href = '/login'; return; }
            const data = await res.json();
            if (data.status !== 'ok') return;

            const alerts = data.alerts;

            // Stats
            document.getElementById('statTotal').textContent = alerts.length;
            document.getElementById('statSOS').textContent = alerts.filter(a => a.alert_type === 'SOS').length;
            document.getElementById('statMedical').textContent = alerts.filter(a => a.alert_type === 'MEDICAL').length;
            document.getElementById('statDevices').textContent = new Set(alerts.map(a => a.device_id)).size;
            const totalFiles = alerts.reduce((sum, a) => sum + (a.uploaded_files ? a.uploaded_files.split(',').filter(f => f.trim()).length : 0), 0);
            document.getElementById('statFiles').textContent = totalFiles;

            // Tables
            document.getElementById('recentTable').innerHTML = buildRecentTable(alerts);
            document.getElementById('recentCount').textContent = `${Math.min(alerts.length, 10)} of ${alerts.length}`;
            document.getElementById('allTable').innerHTML = buildFullTable(alerts);

            // Evidence
            document.getElementById('evidenceGrid').innerHTML = buildEvidenceGrid(alerts);

            // Map
            markers.clearLayers();
            let mc = 0;
            const bounds = [];
            for (const a of alerts) {
                const coords = parseGPS(a.gps_location);
                if (!coords) continue;
                const icon = a.alert_type === 'SOS' ? sosIcon : a.alert_type === 'MEDICAL' ? medicalIcon : defaultIcon;
                L.marker(coords, { icon }).bindPopup(`
                    <strong>${esc(a.alert_type) || 'ALERT'}</strong> #${esc(a.id)}<br>
                    <b>Device:</b> ${esc(a.device_id)}<br>
                    <b>Trigger:</b> ${esc(a.trigger_source) || '-'}<br>
                    <b>Time:</b> ${formatTime(a.timestamp)}<br>
                    <b>Battery:</b> ${esc(a.battery_percentage) || '-'}<br>
                    <b>GPS:</b> ${esc(a.gps_location)}
                `).addTo(markers);
                bounds.push(coords);
                mc++;
            }
            document.getElementById('mapCount').textContent = mc + ' locations';
            if (bounds.length) map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });

            document.getElementById('lastUpdate').textContent =
                new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        } catch (err) {
            console.error('Failed to load alerts:', err);
        }
    }

    loadAlerts();
    setInterval(loadAlerts, 30000);
</script>

</body>
</html>
