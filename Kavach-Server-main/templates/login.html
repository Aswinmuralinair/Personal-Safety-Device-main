<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavach - Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 44px 36px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.06);
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 16px;
            box-shadow: 0 0 40px rgba(8,145,178,0.15);
        }

        .logo-icon img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #111827;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .logo .caption {
            font-size: 13px;
            color: #0891b2;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .logo p {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            color: #111827;
            background: #f9fafb;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #0891b2;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(8,145,178,0.1);
        }

        .form-group input::placeholder { color: #9ca3af; }

        .error-msg {
            background: rgba(220,38,38,0.06);
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid rgba(220,38,38,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #0891b2, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: 0.5px;
        }

        .login-btn:hover { opacity: 0.9; }

        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <img src="/static/kavach_logo.jpeg" alt="Kavach"
                         onerror="this.parentElement.innerHTML='<div style=&quot;width:80px;height:80px;background:linear-gradient(135deg,#0891b2,#7c3aed);border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:32px;&quot;>K</div>'">
                </div>
                <h1>KAVACH</h1>
                <div class="caption">Your Safety, Our Priority</div>
                <p>Admin Dashboard Login</p>
            </div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <p class="footer-text">Personal Safety Device System</p>
        </div>
    </div>
</body>
</html>
