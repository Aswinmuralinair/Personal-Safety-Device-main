name: kavach_app
description: "Kavach Personal Safety Device - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  url_launcher: ^6.2.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/kavach_logo.jpeg"
  adaptive_icon_background: "#0A0C10"
  adaptive_icon_foreground: "assets/images/kavach_logo.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
